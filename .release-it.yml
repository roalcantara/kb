$schema: 'https://unpkg.com/release-it@19/schema/release-it.json'

git:
  # Requests signing of bump commits (actual key/mechanism depends on Git config, e.g. gpg.format=ssh)
  commitArgs: ['-S']
  # Requests signing of release tags (actual key/mechanism depends on Git config, e.g. gpg.format=ssh)
  tagArgs: ['-s']
  # The commit message is used to create the commit that bumps the version
  commitMessage: 'ci(release): Bump version to ${version} [skip ci]'
  # The tag name is used to create the tag the version
  tagName: 'v${version}'
  # The tag annotation is used to create the annotation for the tag
  tagAnnotation: 'Release v${version}'
  # The require branch is used to require the branch to be main
  requireBranch: main
  # Ensures the working directory to be clean before the release
  requireCleanWorkingDir: true
  # Pushes the commit and the tag to the repository
  push: true

github:
  # Creates a GitHub Release with the generated release notes
  release: true
  # Creates a draft release
  draft: true
  # The release name is used to create the name for the release
  releaseName: 'v${version}'
  # It uses the GH_TOKEN (personal) to bypass required status checks when branch protection is enabled on main
  tokenRef: GH_TOKEN

npm:
  publish: false

plugins:
  # Uses the conventional commits preset to create the changelog
  '@release-it/conventional-changelog':
    preset:
      name: conventionalcommits
      types:
        - { type: feat, section: Features }
        - { type: fix, section: Bug Fixes }
        - { type: perf, section: Performance }
        - { type: ref, section: Refactoring }
        - { type: docs, section: Documentation }
        - { type: test, section: Tests, hidden: true }
        - { type: chore, section: Chores, hidden: true }
        - { type: ci, section: CI, hidden: true }
    # The infile is used to specify the file to read the changelog from
    infile: CHANGELOG.md
    # The header is used to specify the header for the changelog section
    header: '# Changelog'
