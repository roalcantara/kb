# https://mise.jdx.dev
# Installs and manages dev tools/runtimes
# Manages environment variables
# Task runner that can be used to share common tasks within a project

[env]
REGISTRY_IMAGE = "roalcantara/kb"
CST_CONFIG = "tools/container-structure-test.yml"

# https://mise.jdx.dev/dev-tools
[tools]
bun = "latest"
usage = "latest"
tombi = "latest"
pre-commit = "4.4"
hadolint = "latest"
container-structure-test = "latest"
devcontainer-cli = "latest"

# https://mise.jdx.dev/tasks
[tasks]
"prepare" = { description = "Install bun dependencies and hooks", usage = '''
    flag "--ci" help="Install dependencies for CI"
  ''', run = '''
    #!/usr/bin/env bash
    bun install $($usage_ci && echo '--frozen-lockfile')
    $usage_ci || pre-commit install --hook-type commit-msg
  ''' }
"setup" = { description = "Install dependencies and hooks", usage = '''
    flag "--ci" help="Install dependencies for CI"
  ''', run = '''
    #!/usr/bin/env bash
    mise install --yes && mise run prepare $($usage_ci && echo '--ci')
  ''' }

# mise run docker:build
# mise run docker:build --nocache --platform amd64
# mise run docker:build --nocache --tag next
"docker:build" = { description = "Build a Docker image for the project", usage = '''
  flag "--nocache" help="Disable build cache"
  flag "--tag <tag>" help="Image tag suffix" default="latest"
  flag "--image <image>" help="Image name (without tag)" env="REGISTRY_IMAGE"
  flag "--platform <platform>" {
    help "Target platform"
    choices "amd64" "arm64" "amd64v2"
    default "arm64"
  }
  ''', run = '''
  #!/usr/bin/env bash
  case "$usage_platform" in
    amd64)    PLATFORM_VALUE="linux/amd64" ;;
    arm64)    PLATFORM_VALUE="linux/arm64" ;;
    amd64v2)  PLATFORM_VALUE="linux/amd64/v2" ;;
  esac

  DOCKER_CMD=(DOCKER_BUILDKIT=1 docker build --build-arg=BUILDKIT_INLINE_CACHE=1 --platform="$PLATFORM_VALUE" --file="Dockerfile")
  [ "${usage_nocache:-false}" = "true" ] && DOCKER_CMD+=(--no-cache)
  DOCKER_CMD+=(--tag "$usage_image:$usage_tag" .)
  echo "  ==> ${DOCKER_CMD[*]}"
  eval "${DOCKER_CMD[*]}"
  ''' }

# mise run docker:run
# mise run docker:run --tag local
# mise run docker:run --image roalcantara/kb:local
# mise run docker:run --xcompile all
# mise run docker:run --xcompile bun-linux-arm64
"docker:run" = { description = "Start a Docker container or cross-compile prod binaries with --xcompile", usage = '''
  flag "--tag <tag>" help="Image tag (use with built image)" default="latest"
  flag "--image <image>" help="Image name (without tag)" env="REGISTRY_IMAGE"
  flag "--xcompile <target>" {
    help "Cross-compile dist/kb in Ubuntu (clean bun install) instead of an interactive shell"
    choices "all" "bun-linux-x64-modern" "bun-linux-arm64" "bun-darwin-arm64"
  }
 ''', run = '''
  #!/usr/bin/env bash
  set -euo pipefail

  if [ -n "${usage_xcompile:-}" ]; then
    target="${usage_xcompile:?}"
    case "$target" in
      all) targets=(bun-linux-x64-modern bun-linux-arm64 bun-darwin-arm64) ;;
      bun-linux-x64-modern|bun-linux-arm64|bun-darwin-arm64) targets=("$target") ;;
      *) echo "unknown --xcompile: $target" >&2; exit 1 ;;
    esac
    export XCOMPILE_TARGETS="${targets[*]}"
    echo "  ==> docker xcompile (Ubuntu 24.04): $XCOMPILE_TARGETS"
    docker run --rm \
      -e XCOMPILE_TARGETS \
      -v "$PWD:/repo" \
      -w /repo \
      ubuntu:24.04 \
      bash -lc 'set -euo pipefail
        apt-get update -y >/dev/null
        apt-get install -y curl unzip ca-certificates rsync >/dev/null
        curl -fsSL https://bun.sh/install | bash >/dev/null
        export PATH="/root/.bun/bin:$PATH"
        bun --version
        work=/tmp/kb-work
        rm -rf "$work"
        mkdir -p "$work"
        rsync -a /repo/ "$work/" --exclude node_modules --exclude dist --exclude .git
        cd "$work"
        bun install --frozen-lockfile
        mkdir -p /repo/dist
        for t in $XCOMPILE_TARGETS; do
          echo "=== build:prod --target=$t ==="
          slug="${t#bun-}"
          out="/tmp/kb.$slug"
          bun build src/shell/index.headless.ts --define KB_HEADLESS_BUILD=true --minify --sourcemap --no-compile-autoload-dotenv --no-compile-autoload-bunfig --compile --outfile "$out" --target="$t"
          cp "$out" "/repo/dist/kb-$slug"
          rm -f "$out"
        done'
    exit 0
  fi

  echo "  ==> docker run -it --rm $usage_image:${usage_tag}"
  docker run -it --rm "$usage_image:$usage_tag"
  ''' }

# mise run docker:test
# mise run docker:test --tag next
# mise run docker:test --image roalcantara/kb:next
"docker:test" = { description = "Run Container Structure Tests for the Docker image", depends = [
  "docker:build"
], usage = '''
  flag "--tag <tag>" help="Image tag" default="latest"
  flag "--image <image>" help="Image name (without tag)" env="REGISTRY_IMAGE"
  flag "--config <config>" help="CST config path" env="CST_CONFIG"
 ''', run = '''
  #!/usr/bin/env bash
  image="${usage_image}:${usage_tag}"
  echo "  ==> container-structure-test test --image $image --config $usage_config"
  mise exec -- container-structure-test test --image "$image" --config "$usage_config"
  ''' }

